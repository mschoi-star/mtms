<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTMS — Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #ffffff;
    --ink: #1f2430;
    --ink-soft: #4a5160;
    --line: #e6e3dd;
    --line-strong: #d6d1c5;
    --warm: #c8a57a;
    --warm-soft: #ecdfca;
    --warm-deep: #8a6a44;
    --shadow: 0 1px 0 rgba(31,36,48,0.04), 0 10px 30px -12px rgba(31,36,48,0.18);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; background: var(--bg); color: var(--ink); font-family: 'Inter','Noto Sans KR', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow:hidden; }
  body{ font-size: 14px; line-height: 1.45; }
  button{ font-family: inherit; }
  #root{ height:100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#ffffff">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- titlebar -->
    <rect x="80" y="80" width="1040" height="60" fill="#1f2430"/>
    <text x="120" y="120" font-family="monospace" font-size="28" fill="#ffffff" letter-spacing="6">MTMS</text>
    <!-- sidebar -->
    <rect x="80" y="140" width="160" height="580" fill="#ffffff" stroke="#1f2430" stroke-width="4"/>
    <!-- program icons -->
    <g>
      <rect x="120" y="180" width="80" height="80" rx="14" fill="#ffffff" stroke="#1f2430" stroke-width="4"/>
      <rect x="135" y="195" width="50" height="50" fill="#c8a57a"/>
      <rect x="120" y="290" width="80" height="80" rx="14" fill="#ffffff" stroke="#1f2430" stroke-width="4"/>
      <rect x="135" y="305" width="50" height="50" fill="#1f2430"/>
      <rect x="120" y="400" width="80" height="80" rx="14" fill="#ffffff" stroke="#1f2430" stroke-width="4"/>
      <rect x="135" y="415" width="50" height="50" fill="#c8a57a"/>
    </g>
    <!-- browser window -->
    <rect x="280" y="180" width="840" height="500" fill="#ffffff" stroke="#1f2430" stroke-width="4"/>
    <rect x="280" y="180" width="840" height="50" fill="#f1ede3" stroke="#1f2430" stroke-width="4"/>
    <circle cx="310" cy="205" r="9" fill="#c8a57a" stroke="#1f2430" stroke-width="2"/>
    <circle cx="335" cy="205" r="9" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
    <circle cx="360" cy="205" r="9" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
    <!-- hamster (simple ellipse) -->
    <ellipse cx="700" cy="730" rx="60" ry="36" fill="#c8a57a" stroke="#1f2430" stroke-width="3"/>
    <circle cx="755" cy="710" r="28" fill="#c8a57a" stroke="#1f2430" stroke-width="3"/>
    <circle cx="765" cy="705" r="4" fill="#1f2430"/>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="hamster.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="windows.jsx"></script>
<script type="text/babel" src="apps.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
